<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Магазин</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, getDocs, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─────────────────────────────────────────
  // ЗАМЕНИТЕ на свои Firebase настройки
  // ─────────────────────────────────────────
  const firebaseConfig = {
  apiKey: "AIzaSyBovYF2EBu3WniLpWsauD6VOae9-A_f8iI",
  authDomain: "my-marketplace-913cd.firebaseapp.com",
  projectId: "my-marketplace-913cd",
  storageBucket: "my-marketplace-913cd.firebasestorage.app",
  messagingSenderId: "273211109313",
  appId: "1:273211109313:web:512d79094d0a4cebbac940",
  measurementId: "G-5WE0QEZ5V7"
  };
  // ─────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Telegram user ──────────────────────────
  const tg   = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor("#0f0f0f");
  tg.setBackgroundColor("#0f0f0f");

  const tgUser = tg.initDataUnsafe?.user || {
    id: 0, first_name: "Гость", last_name: "", username: "guest"
  };
  const userId = String(tgUser.id);

  // ── State ──────────────────────────────────
  let products = [];
  let cart     = {};   // { productId: { name, price, qty } }
  let currentTab = "catalog";

  // ── Ensure user doc ────────────────────────
  async function ensureUser() {
    const ref = doc(db, "users", userId);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        id: userId,
        first_name: tgUser.first_name,
        last_name:  tgUser.last_name  || "",
        username:   tgUser.username   || "",
        created_at: new Date().toISOString()
      });
    }
    // Load cart
    const cartSnap = await getDoc(doc(db, "carts", userId));
    if (cartSnap.exists()) cart = cartSnap.data().items || {};
  }

  async function saveCart() {
    await setDoc(doc(db, "carts", userId), { items: cart });
  }

  // ── Load products ──────────────────────────
  async function loadProducts() {
    const q = query(collection(db, "products"), orderBy("created_at", "desc"));
    const snap = await getDocs(q);
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  // ── Cart helpers ───────────────────────────
  function cartTotal() {
    return Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
  }
  function cartCount() {
    return Object.values(cart).reduce((s, i) => s + i.qty, 0);
  }

  function addToCart(pid) {
    const p = products.find(x => x.id === pid);
    if (!p) return;
    if (cart[pid]) cart[pid].qty++;
    else cart[pid] = { name: p.name, price: p.price, qty: 1 };
    saveCart();
    updateBadge();
    renderCart();
    flashButton(pid);
  }

  function removeFromCart(pid) {
    delete cart[pid];
    saveCart();
    updateBadge();
    renderCart();
    renderProfile();
  }

  function clearCart() {
    cart = {};
    saveCart();
    updateBadge();
    renderCart();
    renderProfile();
  }

  // ── Render helpers ─────────────────────────
  function fmt(n) { return n.toLocaleString("ru-RU"); }

  function updateBadge() {
    const cnt = cartCount();
    const badge = document.getElementById("cart-badge");
    badge.textContent = cnt;
    badge.style.display = cnt > 0 ? "flex" : "none";
    document.getElementById("total-pill").textContent = fmt(cartTotal()) + " ₽";
  }

  function renderCatalog() {
    const grid = document.getElementById("product-grid");
    if (!products.length) {
      grid.innerHTML = `<div class="empty-state">😔 Товаров пока нет.<br>Спросите администратора.</div>`;
      return;
    }
    grid.innerHTML = products.map(p => {
      const inCart = cart[p.id];
      return `
      <div class="card" id="card-${p.id}">
        <div class="card-emoji">${p.emoji || "📦"}</div>
        <div class="card-body">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-price">${fmt(p.price)} ₽</div>
        </div>
        <button class="btn-add ${inCart ? 'in-cart' : ''}" onclick="window._addToCart('${p.id}')">
          ${inCart ? `✓ ${inCart.qty} шт.` : "+ В корзину"}
        </button>
      </div>`;
    }).join("");
  }

  function renderCart() {
    const items = Object.entries(cart);
    const box = document.getElementById("cart-items");
    const empty = document.getElementById("cart-empty");
    const summary = document.getElementById("cart-summary");

    if (!items.length) {
      box.innerHTML = "";
      empty.style.display = "flex";
      summary.style.display = "none";
      return;
    }
    empty.style.display = "none";
    summary.style.display = "flex";

    box.innerHTML = items.map(([pid, item]) => `
      <div class="cart-row">
        <div class="cart-info">
          <div class="cart-name">${esc(item.name)}</div>
          <div class="cart-meta">${item.qty} × ${fmt(item.price)} ₽</div>
        </div>
        <div class="cart-right">
          <div class="cart-sub">${fmt(item.price * item.qty)} ₽</div>
          <button class="btn-remove" onclick="window._removeFromCart('${pid}')">✕</button>
        </div>
      </div>`).join("");

    document.getElementById("cart-total-sum").textContent = fmt(cartTotal()) + " ₽";
    // refresh catalog buttons
    renderCatalog();
  }

  function renderProfile() {
    document.getElementById("prof-name").textContent =
      [tgUser.first_name, tgUser.last_name].filter(Boolean).join(" ");
    document.getElementById("prof-username").textContent =
      tgUser.username ? "@" + tgUser.username : "—";
    document.getElementById("prof-id").textContent = userId;

    const items = Object.values(cart);
    const profList = document.getElementById("prof-cart-list");
    if (!items.length) {
      profList.innerHTML = `<div class="empty-small">Корзина пуста</div>`;
    } else {
      profList.innerHTML = items.map(i =>
        `<div class="prof-item"><span>${esc(i.name)}</span><span>${fmt(i.price * i.qty)} ₽</span></div>`
      ).join("");
    }
    document.getElementById("prof-total").textContent = fmt(cartTotal()) + " ₽";
  }

  function flashButton(pid) {
    const btn = document.querySelector(`#card-${pid} .btn-add`);
    if (!btn) return;
    btn.classList.add("flash");
    btn.classList.add("in-cart");
    const item = cart[pid];
    btn.textContent = item ? `✓ ${item.qty} шт.` : "+ В корзину";
    setTimeout(() => btn.classList.remove("flash"), 400);
  }

  // ── Checkout ───────────────────────────────
  function checkout() {
    const items = Object.values(cart);
    if (!items.length) return;
    tg.sendData(JSON.stringify({ action: "order", items, total: cartTotal() }));
  }

  // ── Tab switching ──────────────────────────
  window.switchTab = function(tab) {
    currentTab = tab;
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("page-" + tab).classList.add("active");
    document.getElementById("tab-" + tab).classList.add("active");
    if (tab === "catalog") renderCatalog();
    if (tab === "cart")    renderCart();
    if (tab === "profile") renderProfile();
  };

  // ── Expose to HTML ─────────────────────────
  window._addToCart     = addToCart;
  window._removeFromCart = removeFromCart;
  window._clearCart     = clearCart;
  window._checkout      = checkout;

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── Init ───────────────────────────────────
  (async () => {
    document.getElementById("loader").style.display = "flex";
    try {
      await ensureUser();
      await loadProducts();
      renderCatalog();
      updateBadge();
    } catch(e) {
      console.error(e);
      document.getElementById("product-grid").innerHTML =
        `<div class="empty-state">⚠️ Ошибка загрузки.<br>Проверьте Firebase настройки.</div>`;
    }
    document.getElementById("loader").style.display = "none";
    document.getElementById("app").style.display = "flex";
  })();
</script>

<style>
:root {
  --bg:      #0f0f0f;
  --surface: #1a1a1a;
  --border:  #2a2a2a;
  --accent:  #5b9cf6;
  --accent2: #a78bfa;
  --green:   #4ade80;
  --red:     #f87171;
  --text:    #f0f0f0;
  --muted:   #888;
  --r:       14px;
  --tg-theme-bg-color: #0f0f0f;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; }

/* ── Loader ── */
#loader {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 99;
}
.spin {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── App shell ── */
#app {
  display: none; flex-direction: column; height: 100dvh; overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
.header-title span { color: var(--accent); }
.total-pill {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
}

/* ── Pages ── */
.pages { flex: 1; overflow: hidden; position: relative; }
.page { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 16px; gap: 12px; }
.page.active { display: flex; }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }

/* ── Product grid ── */
#product-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px; display: flex; flex-direction: column; gap: 8px;
  transition: transform .15s, border-color .15s;
}
.card:active { transform: scale(.97); }
.card-emoji { font-size: 36px; text-align: center; }
.card-body { flex: 1; }
.card-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
.card-price { font-size: 15px; font-weight: 700; color: var(--accent); }
.btn-add {
  width: 100%; padding: 8px 0; border-radius: 8px; border: none; cursor: pointer;
  background: var(--accent); color: #fff; font-size: 12px; font-weight: 700;
  transition: background .2s, transform .1s;
}
.btn-add.in-cart { background: var(--green); color: #000; }
.btn-add.flash { animation: pop .3s; }
@keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.btn-add:active { transform: scale(.96); }

/* ── Cart ── */
.cart-row {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px 14px; display: flex; align-items: center; gap: 12px;
}
.cart-info { flex: 1; }
.cart-name { font-size: 14px; font-weight: 600; }
.cart-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.cart-right { display: flex; align-items: center; gap: 10px; }
.cart-sub { font-size: 14px; font-weight: 700; color: var(--accent); }
.btn-remove {
  width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
  background: #2a1a1a; color: var(--red); font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.btn-remove:active { transform: scale(.9); }

#cart-empty {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--muted); font-size: 15px; padding: 40px 0; text-align: center;
}
#cart-empty .big-icon { font-size: 48px; }

#cart-summary {
  display: none; flex-direction: column; gap: 10px;
  padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
}
.summary-row { display: flex; justify-content: space-between; align-items: center; }
.summary-label { color: var(--muted); font-size: 13px; }
#cart-total-sum { font-size: 20px; font-weight: 800; color: var(--green); }
.btn-checkout {
  width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 15px; font-weight: 700;
  transition: opacity .2s, transform .1s;
}
.btn-checkout:active { transform: scale(.98); opacity: .9; }
.btn-clear {
  width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer;
  background: transparent; color: var(--red); font-size: 13px; font-weight: 600;
}

/* ── Profile ── */
.prof-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 18px;
}
.prof-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 12px;
}
.prof-name { font-size: 18px; font-weight: 700; }
.prof-username { color: var(--accent); font-size: 13px; margin-top: 2px; }
.prof-row { display: flex; justify-content: space-between; font-size: 13px; margin-top: 8px; color: var(--muted); }
.prof-row span:last-child { color: var(--text); }

.section-label { font-size: 11px; font-weight: 700; letter-spacing: .8px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.prof-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.prof-item:last-child { border-bottom: none; }
.prof-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.prof-total-label { font-size: 13px; color: var(--muted); }
.prof-total-val { font-size: 17px; font-weight: 800; color: var(--green); }
.empty-small { color: var(--muted); font-size: 13px; padding: 8px 0; }
.empty-state { color: var(--muted); text-align: center; padding: 40px 0; line-height: 1.6; grid-column: 1/-1; }

/* ── Tabs ── */
.tabs {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding: 9px 0 10px; border: none; background: transparent; color: var(--muted);
  font-size: 10px; font-weight: 600; cursor: pointer; position: relative; transition: color .2s;
}
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 20px; }
.cart-badge {
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: var(--red); color: #fff; font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
  display: none; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spin"></div>
  <span style="color:var(--muted);font-size:13px">Загрузка…</span>
</div>

<!-- App -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-title">🛍 <span>Маркет</span></div>
    <div class="total-pill" id="total-pill">0 ₽</div>
  </div>

  <!-- Pages -->
  <div class="pages">

    <!-- CATALOG -->
    <div class="page active" id="page-catalog">
      <div class="page-title">Каталог</div>
      <div id="product-grid"></div>
    </div>

    <!-- CART -->
    <div class="page" id="page-cart">
      <div class="page-title">Корзина</div>
      <div id="cart-empty">
        <div class="big-icon">🛒</div>
        <div>Добавьте товары из каталога</div>
      </div>
      <div id="cart-items" style="display:flex;flex-direction:column;gap:8px"></div>
      <div id="cart-summary">
        <div class="summary-row">
          <span class="summary-label">Итого</span>
          <span id="cart-total-sum">0 ₽</span>
        </div>
        <button class="btn-checkout" onclick="window._checkout()">✅ Оформить заказ</button>
        <button class="btn-clear"    onclick="window._clearCart()">🗑 Очистить корзину</button>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="page" id="page-profile">
      <div class="page-title">Личный кабинет</div>
      <div class="prof-card">
        <div class="prof-avatar">👤</div>
        <div class="prof-name" id="prof-name">—</div>
        <div class="prof-username" id="prof-username">—</div>
        <div class="prof-row"><span>Telegram ID</span><span id="prof-id">—</span></div>
      </div>
      <div class="section-label">Товары в корзине</div>
      <div class="prof-card">
        <div id="prof-cart-list"></div>
        <div class="prof-total-row">
          <span class="prof-total-label">Итого</span>
          <span class="prof-total-val" id="prof-total">0 ₽</span>
        </div>
      </div>
    </div>

  </div><!-- /pages -->

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-catalog" onclick="switchTab('catalog')">
      <span class="tab-icon">🏪</span>Каталог
    </button>
    <button class="tab-btn" id="tab-cart" onclick="switchTab('cart')">
      <span class="tab-icon">🛒</span>Корзина
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
    <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">
      <span class="tab-icon">👤</span>Кабинет
    </button>
  </div>

</div><!-- /app -->
</body>
</html>
